name: CI — Tests PULSE

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # BACKEND — Jest + Supertest + MongoDB in-memory
  # ─────────────────────────────────────────────
  backend-tests:
    name: Tests backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NFC/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: NFC/backend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_secret_key_for_tests

  # ─────────────────────────────────────────────
  # FRONTEND — Vitest (unitaires + intégration)
  # ─────────────────────────────────────────────
  frontend-tests:
    name: Tests frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NFC/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: NFC/frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests
        run: npm test

  # ─────────────────────────────────────────────
  # E2E — Playwright (optionnel en CI, lancé manuellement)
  # ─────────────────────────────────────────────
  e2e-tests:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: NFC/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: NFC/frontend/package-lock.json

      - name: Installer les dépendances frontend
        run: npm ci

      - name: Installer les dépendances backend
        run: npm ci
        working-directory: NFC/backend

      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps chromium

      - name: Démarrer le backend
        run: npm run start &
        working-directory: NFC/backend
        env:
          PORT: 4000
          NODE_ENV: test
          JWT_SECRET: ci_secret_key_for_tests
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}

      - name: Lancer les tests E2E
        run: npx playwright test
        env:
          CI: true
          NUXT_PUBLIC_API_BASE: http://localhost:4000/api

      - name: Upload rapport Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: NFC/frontend/playwright-report/
          retention-days: 7
